          enabled: true
          source: manual
          note: ''
        - query: >-
            Post training quantization for large language models using FP4 INT3 INT2 precision with methods SpinQuant
            Quarot QTIP AWQ v2 GPTQ v3 SmoothQuant v2 and evaluation on perplexity MMLU HumanEval and inference
            throughput on NVIDIA H100 H200 B100 B200
          query_cn: >-
            大语言模型后训练量化，使用 FP4、INT3、INT2 精度，方法包括 SpinQuant、Quarot、QTIP、AWQ v2、GPTQ v3、SmoothQuant v2，评测困惑度、MMLU、HumanEval
            以及 NVIDIA H100/H200/B100/B200 上的推理吞吐量。
          enabled: true
          source: manual
          note: ''
        - query: >-
            Structured pruning knowledge distillation low rank decomposition and mixed precision inference for extreme
            compression of large language models with hardware optimization for NVIDIA Blackwell architecture
          query_cn: 针对大语言模型极端压缩的结构化剪枝、知识蒸馏、低秩分解和混合精度推理，并针对 NVIDIA Blackwell 架构进行硬件优化。
          enabled: true
          source: manual
          note: ''
