    - tag: Compression
      description: >-
        查找 2025-2026
        年大语言模型和多模态模型压缩领域的前沿论文，聚焦后训练量化（PTQ）技术，包括极低比特量化（MXFP4、NVFP4、FP4、INT3、INT2）及最新算法（SpinQuant、Quarot、QTIP、AWQ v2、GPTQ
        v3、SmoothQuant v2），同时覆盖剪枝、蒸馏、低秩分解、混合精度推理，要求包含精度指标和推理性能对比，以及针对 Blackwell 架构的硬件细节。
